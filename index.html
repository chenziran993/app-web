<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寻道 - Chronicles of a Digital Cultivator</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --paper: #F4F2EC;
            --ink: #2A2927;
            --ink-light: #5A5855;
            --ink-faint: rgba(42, 41, 39, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--paper);
            color: var(--ink);
            font-family: 'Noto Serif SC', serif;
            overflow: hidden;
        }

        ::selection {
            background: var(--ink);
            color: var(--paper);
        }

        /* 主容器 - 全屏布局 */
        .viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 留白区域 */
        .margin-band {
            flex: 0 0 18vh;
            position: relative;
            z-index: 10;
        }

        /* 画布区域 - 承载 WebGL */
        .canvas-area {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        #webgl-container {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* 内容层 */
        .content-layer {
            position: absolute;
            inset: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .interactive {
            pointer-events: auto;
        }

        /* 居中内容容器 */
        .center-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            animation: fadeIn 1.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 主标题 */
        .primary-title {
            writing-mode: horizontal-tb;
            text-orientation: mixed;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 300;
            letter-spacing: 0.5em;
            color: var(--ink);
            margin-bottom: 2rem;
            text-shadow: 0 2px 20px rgba(244, 242, 236, 0.8);
        }

        .title-line {
            display: block;
            animation: slideUp 1s ease-out backwards;
        }

        .title-line:nth-child(2) {
            animation-delay: 0.2s;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 副标题块 */
        .secondary-block {
            font-family: 'Cormorant Garamond', serif;
            margin-bottom: 3rem;
            animation: fadeIn 1.5s ease-out 0.4s backwards;
        }

        .eng-title {
            font-size: clamp(1rem, 2vw, 1.4rem);
            font-weight: 400;
            letter-spacing: 0.15em;
            margin-bottom: 1rem;
            color: var(--ink);
        }

        .author-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .author-name {
            font-size: 1rem;
            letter-spacing: 0.2em;
        }

        .separator {
            color: var(--ink-light);
            font-size: 0.8rem;
        }

        .cn-name {
            font-size: 0.95rem;
            letter-spacing: 0.6em;
        }

        .role {
            font-size: 0.7rem;
            letter-spacing: 0.3em;
            color: var(--ink-light);
            margin-top: 0.8rem;
        }

        /* 导航链接 */
        .nav-links {
            display: flex;
            gap: 3rem;
            animation: fadeIn 1.5s ease-out 0.6s backwards;
        }

        .nav-item {
            text-decoration: none;
            color: var(--ink);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
            padding: 0.5rem 0;
        }

        .nav-item::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 1px;
            background: var(--ink);
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            transform: translateX(-50%);
        }

        .nav-item:hover::after {
            width: 100%;
        }

        .nav-item:hover {
            color: var(--ink);
        }

        .nav-cn {
            font-size: 0.95rem;
            letter-spacing: 0.4em;
            margin-bottom: 0.3rem;
        }

        .nav-en {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.7rem;
            font-style: italic;
            letter-spacing: 0.15em;
            color: var(--ink-light);
        }

        /* 底部标记 */
        .footer-mark {
            position: absolute;
            bottom: 3vh;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            color: var(--ink-light);
            animation: fadeIn 1.5s ease-out 0.8s backwards;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .nav-links {
                gap: 2rem;
            }

            .nav-cn {
                font-size: 0.85rem;
            }

            .primary-title {
                letter-spacing: 0.3em;
            }

            .margin-band {
                flex: 0 0 12vh;
            }
        }

        @media (max-width: 480px) {
            .nav-links {
                flex-direction: column;
                gap: 1.5rem;
            }

            .author-row {
                flex-direction: column;
                gap: 0.3rem;
            }

            .separator {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="viewport">
        <div class="margin-band"></div>

        <div class="canvas-area">
            <div id="webgl-container"></div>
        </div>

        <div class="margin-band"></div>

        <div class="content-layer">
            <div class="center-container">
                <h1 class="primary-title">
                    <span class="title-line">天地蜉蝣</span>
                    <span class="title-line">沧海一粟</span>
                </h1>

                <div class="secondary-block interactive">
                    <div class="eng-title">Chronicles of Solitude</div>
                    <div class="author-row">
                        <span class="author-name">Gu Yun</span>
                        <span class="separator">·</span>
                        <span class="cn-name">孤云录</span>
                    </div>
                    <div class="role">数字修真者</div>
                </div>

                <nav class="nav-links interactive">
                    <a href="index.html" class="nav-item">
                        <span class="nav-cn">首页</span>
                        <span class="nav-en">Home</span>
                    </a>
                    <a href="products.html" class="nav-item">
                        <span class="nav-cn">炼器坊</span>
                        <span class="nav-en">Artifacts</span>
                    </a>
                    <a href="admin.html" class="nav-item">
                        <span class="nav-cn">洞府</span>
                        <span class="nav-en">Dwelling</span>
                    </a>
                </nav>
            </div>

            <div class="footer-mark">
                甲辰年 · 寻道
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });

        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            uniform float u_time;
            uniform vec2 u_resolution;
            varying vec2 vUv;

            vec3 permute(vec3 x) { return mod(((x*34.0)+1.0)*x, 289.0); }

            float snoise(vec2 v){
                const vec4 C = vec4(0.211324865405187, 0.366025403784439,
                        -0.577350269189626, 0.024390243902439);
                vec2 i  = floor(v + dot(v, C.yy));
                vec2 x0 = v - i + dot(i, C.xx);
                vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
                vec4 x12 = x0.xyxy + C.xxzz;
                x12.xy -= i1;
                i = mod(i, 289.0);
                vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0));
                vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
                m = m*m;
                m = m*m;
                vec3 x = 2.0 * fract(p * C.www) - 1.0;
                vec3 h = abs(x) - 0.5;
                vec3 ox = floor(x + 0.5);
                vec3 a0 = x - ox;
                m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
                vec3 g;
                g.x = a0.x * x0.x + h.x * x0.y;
                g.yz = a0.yz * x12.xz + h.yz * x12.yw;
                return 130.0 * dot(m, g);
            }

            float fbm(vec2 st) {
                float value = 0.0;
                float amplitude = 0.5;
                for (int i = 0; i < 5; i++) {
                    value += amplitude * snoise(st);
                    st *= 2.0;
                    amplitude *= 0.5;
                }
                return value;
            }

            void main() {
                vec2 st = gl_FragCoord.xy / u_resolution.xy;
                st.x *= u_resolution.x / u_resolution.y;

                float time = u_time * 0.05;

                vec2 q = vec2(0.);
                q.x = fbm(st + vec2(time));
                q.y = fbm(st + vec2(1.0));

                vec2 r = vec2(0.);
                r.x = fbm(st + 1.0*q + vec2(1.7,9.2)+ 0.15*time);
                r.y = fbm(st + 1.0*q + vec2(8.3,2.8)+ 0.126*time);

                float f = fbm(st + r);

                vec3 colorPaper = vec3(0.96, 0.95, 0.93);
                vec3 colorSlate = vec3(0.54, 0.55, 0.53);
                vec3 colorUmber = vec3(0.42, 0.36, 0.32);
                vec3 colorMist = vec3(0.64, 0.68, 0.67);
                vec3 colorWhite = vec3(0.92, 0.92, 0.90);

                vec3 color = mix(colorPaper, colorMist, clamp((f*f)*4.0, 0.0, 1.0));
                color = mix(color, colorSlate, clamp(length(q), 0.0, 1.0));
                color = mix(color, colorUmber, clamp(length(r.x), 0.0, 1.0) * 0.5);

                float highlight = smoothstep(0.6, 1.0, f);
                color = mix(color, colorWhite, highlight * 0.8);

                float banding = sin(st.y * 100.0) * 0.015;
                color += banding;

                gl_FragColor = vec4(color, 1.0);
            }
        `;

        const uniforms = {
            u_time: { value: 0.0 },
            u_resolution: { value: new THREE.Vector2(container.clientWidth, container.clientHeight) }
        };

        const material = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms
        });

        const geometry = new THREE.PlaneGeometry(2, 2);
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            uniforms.u_time.value = clock.getElapsedTime();
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            const width = container.clientWidth;
            const height = container.clientHeight;
            renderer.setSize(width, height);
            uniforms.u_resolution.value.set(width, height);
        });
    </script>
</body>
</html>
