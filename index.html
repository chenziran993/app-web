<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寻道 - Chronicles of a Digital Cultivator</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --paper: #F4F2EC;
            --ink: #2A2927;
            --ink-light: #5A5855;
            --margin-height: 18vh;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: var(--paper);
            color: var(--ink);
            font-family: 'Noto Serif SC', serif;
            overflow: hidden;
        }

        ::selection {
            background: var(--ink);
            color: var(--paper);
        }

        .viewport {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .margin-band {
            height: var(--margin-height);
            width: 100%;
            background-color: var(--paper);
            z-index: 10;
            position: relative;
        }

        .canvas-area {
            flex-grow: 1;
            width: 100%;
            position: relative;
            overflow: hidden;
        }

        #webgl-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .content-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 20;
            pointer-events: none;
        }

        .interactive {
            pointer-events: auto;
        }

        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* 主标题 - 竖排文字 */
        .primary-title {
            position: absolute;
            top: calc(var(--margin-height) - 2vh);
            right: 12vw;
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-size: 2.8rem;
            font-weight: 300;
            letter-spacing: 0.8em;
            line-height: 2;
            color: var(--ink);
            text-shadow: 0 0 20px rgba(244, 242, 236, 0.5);
            animation: fadeIn 1.5s ease-out;
        }

        .primary-title span {
            display: inline-block;
            margin-bottom: 0.2em;
        }

        /* 副标题块 */
        .secondary-block {
            position: absolute;
            bottom: calc(var(--margin-height) + 15vh);
            right: 18vw;
            font-family: 'Cormorant Garamond', serif;
            text-align: left;
            animation: slideIn 1.5s ease-out 0.3s backwards;
        }

        .eng-title {
            font-size: 1.4rem;
            font-weight: 400;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
            color: var(--ink);
        }

        .author-name {
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            margin-bottom: 0.2rem;
        }

        .cn-name {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 0.5em;
            margin-bottom: 0.8rem;
        }

        .role {
            font-family: 'Noto Serif SC', serif;
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 0.2em;
            color: var(--ink-light);
        }

        /* 导航链接 - 左侧垂直排列 */
        .nav-links {
            position: absolute;
            top: 40vh;
            left: 15vw;
            display: flex;
            flex-direction: column;
            gap: 3rem;
            animation: slideIn 1.5s ease-out 0.5s backwards;
        }

        .nav-item {
            text-decoration: none;
            color: var(--ink);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            transition: opacity 0.6s ease;
        }

        .nav-links:hover .nav-item {
            opacity: 0.3;
        }

        .nav-links .nav-item:hover {
            opacity: 1;
        }

        .nav-cn {
            font-size: 1.2rem;
            letter-spacing: 0.3em;
            margin-bottom: 0.2rem;
            position: relative;
        }

        .nav-cn::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0%;
            height: 1px;
            background-color: var(--ink);
            transition: width 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .nav-item:hover .nav-cn::after {
            width: 80%;
        }

        .nav-en {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.8rem;
            font-style: italic;
            letter-spacing: 0.1em;
            color: var(--ink-light);
        }

        /* 浮动诗句 */
        .floating-poem {
            position: absolute;
            top: 25vh;
            right: 40vw;
            writing-mode: vertical-rl;
            font-size: 0.9rem;
            color: var(--ink-light);
            letter-spacing: 0.5em;
            line-height: 2.5;
            opacity: 0.7;
            mix-blend-mode: multiply;
            animation: fadeIn 2s ease-out 0.8s backwards;
        }

        /* 底部标记 */
        .footer-mark {
            position: absolute;
            bottom: calc(var(--margin-height) / 2);
            left: 8vw;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            color: var(--ink-light);
            transform: translateY(50%);
            animation: fadeIn 1.5s ease-out 1s backwards;
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .primary-title { right: 8vw; font-size: 2.2rem; }
            .secondary-block { right: 10vw; bottom: calc(var(--margin-height) + 10vh); }
            .nav-links { left: 10vw; }
            .floating-poem { display: none; }
        }

        @media (max-width: 768px) {
            .margin-band {
                height: 12vh;
            }

            .nav-links {
                top: 30vh;
                left: 8vw;
                gap: 2rem;
            }

            .primary-title {
                right: 5vw;
                font-size: 1.8rem;
            }

            .secondary-block {
                right: 8vw;
                bottom: calc(12vh + 8vh);
            }

            .nav-cn {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="viewport">
        <div class="margin-band"></div>

        <div class="canvas-area">
            <div id="webgl-container"></div>
        </div>

        <div class="margin-band"></div>

        <div class="content-layer">
            <div class="primary-title">
                天地蜉蝣<br>沧海一粟
            </div>

            <div class="secondary-block interactive">
                <div class="eng-title">Chronicles of Solitude</div>
                <div class="author-name">Gu Yun</div>
                <div class="cn-name">孤 云 · 录</div>
                <div class="role">数字修真者 撰</div>
            </div>

            <nav class="nav-links interactive">
                <a href="index.html" class="nav-item">
                    <span class="nav-cn">首页</span>
                    <span class="nav-en">Home</span>
                </a>
                <a href="products.html" class="nav-item">
                    <span class="nav-cn">炼器坊</span>
                    <span class="nav-en">Artifacts</span>
                </a>
                <a href="admin.html" class="nav-item">
                    <span class="nav-cn">洞府</span>
                    <span class="nav-en">Dwelling</span>
                </a>
            </nav>

            <div class="floating-poem">
                心若冰清，天塌不惊。<br>
                万变犹定，神怡气静。
            </div>

            <div class="footer-mark interactive">
                甲辰年 · 寻道
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: false });

        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            uniform float u_time;
            uniform vec2 u_resolution;
            varying vec2 vUv;

            vec3 permute(vec3 x) { return mod(((x*34.0)+1.0)*x, 289.0); }

            float snoise(vec2 v){
                const vec4 C = vec4(0.211324865405187, 0.366025403784439,
                        -0.577350269189626, 0.024390243902439);
                vec2 i  = floor(v + dot(v, C.yy));
                vec2 x0 = v - i + dot(i, C.xx);
                vec2 i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
                vec4 x12 = x0.xyxy + C.xxzz;
                x12.xy -= i1;
                i = mod(i, 289.0);
                vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0));
                vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
                m = m*m;
                m = m*m;
                vec3 x = 2.0 * fract(p * C.www) - 1.0;
                vec3 h = abs(x) - 0.5;
                vec3 ox = floor(x + 0.5);
                vec3 a0 = x - ox;
                m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
                vec3 g;
                g.x = a0.x * x0.x + h.x * x0.y;
                g.yz = a0.yz * x12.xz + h.yz * x12.yw;
                return 130.0 * dot(m, g);
            }

            float fbm(vec2 st) {
                float value = 0.0;
                float amplitude = 0.5;
                for (int i = 0; i < 5; i++) {
                    value += amplitude * snoise(st);
                    st *= 2.0;
                    amplitude *= 0.5;
                }
                return value;
            }

            void main() {
                vec2 st = gl_FragCoord.xy / u_resolution.xy;
                st.x *= u_resolution.x / u_resolution.y;
                float time = u_time * 0.05;

                vec2 q = vec2(0.);
                q.x = fbm(st + vec2(time));
                q.y = fbm(st + vec2(1.0));

                vec2 r = vec2(0.);
                r.x = fbm(st + 1.0*q + vec2(1.7,9.2)+ 0.15*time);
                r.y = fbm(st + 1.0*q + vec2(8.3,2.8)+ 0.126*time);

                float f = fbm(st + r);

                vec3 colorPaper = vec3(0.96, 0.95, 0.93);
                vec3 colorSlate = vec3(0.54, 0.55, 0.53);
                vec3 colorUmber = vec3(0.42, 0.36, 0.32);
                vec3 colorMist = vec3(0.64, 0.68, 0.67);
                vec3 colorWhite = vec3(0.92, 0.92, 0.90);

                vec3 color = mix(colorPaper, colorMist, clamp((f*f)*4.0, 0.0, 1.0));
                color = mix(color, colorSlate, clamp(length(q), 0.0, 1.0));
                color = mix(color, colorUmber, clamp(length(r.x), 0.0, 1.0) * 0.5);

                float highlight = smoothstep(0.6, 1.0, f);
                color = mix(color, colorWhite, highlight * 0.8);

                float banding = sin(st.y * 100.0) * 0.015;
                color += banding;

                gl_FragColor = vec4(color, 1.0);
            }
        `;

        const uniforms = {
            u_time: { value: 0.0 },
            u_resolution: { value: new THREE.Vector2(container.clientWidth, container.clientHeight) }
        };

        const material = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms
        });

        const geometry = new THREE.PlaneGeometry(2, 2);
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            uniforms.u_time.value = clock.getElapsedTime();
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            const width = container.clientWidth;
            const height = container.clientHeight;
            renderer.setSize(width, height);
            uniforms.u_resolution.value.set(width, height);
        });
    </script>
</body>
</html>
