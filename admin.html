<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洞府 - 寻道</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <style>
        /* Page-specific styles for admin page */
        .page-title {
            position: absolute;
            top: calc(var(--margin-height) - 2vh);
            right: 12vw;
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-size: 2.8rem;
            font-weight: 300;
            letter-spacing: 0.8em;
            line-height: 2;
            color: var(--ink);
            text-shadow: 0 0 20px rgba(244, 242, 236, 0.5);
        }

        .admin-container {
            position: absolute;
            top: calc(var(--margin-height) + 8vh);
            left: 25vw;
            right: 8vw;
            bottom: calc(var(--margin-height) / 2);
            overflow-y: auto;
            pointer-events: auto;
        }

        /* Login Form Styles */
        .login-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 300px;
        }

        .login-form {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }

        .login-form .form-group {
            margin-bottom: 2rem;
        }

        .login-form .form-input {
            text-align: center;
            font-size: 1.2rem;
            letter-spacing: 0.3em;
            padding: 1em;
        }

        .login-error {
            color: var(--umber);
            font-size: 0.875rem;
            letter-spacing: 0.1em;
            margin-top: 1rem;
            text-align: center;
            opacity: 0;
            transition: opacity var(--transition-medium);
        }

        .login-error.visible {
            opacity: 1;
        }

        /* Admin Panel Styles */
        .admin-section {
            display: none;
        }

        .admin-tabs {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--slate);
            padding-bottom: 1rem;
        }

        .admin-tab {
            font-size: 1.1rem;
            letter-spacing: 0.2em;
            color: var(--ink-light);
            cursor: pointer;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid transparent;
            transition: all var(--transition-medium);
        }

        .admin-tab:hover {
            color: var(--ink);
        }

        .admin-tab.active {
            color: var(--ink);
            border-bottom-color: var(--ink);
        }

        .admin-panel {
            display: none;
        }

        .admin-panel.active {
            display: block;
        }

        /* Product Form */
        .product-form {
            max-width: 600px;
            padding: 2rem;
            background-color: var(--white);
            border: 1px solid var(--slate);
        }

        .product-form .form-group {
            margin-bottom: 1.5rem;
        }

        .image-upload-area {
            border: 2px dashed var(--slate);
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition-medium);
            background-color: var(--paper);
        }

        .image-upload-area:hover {
            border-color: var(--ink);
            background-color: var(--white);
        }

        .image-upload-area.has-image {
            padding: 0;
            border-style: solid;
        }

        .image-upload-area .upload-placeholder {
            color: var(--ink-light);
            font-size: 0.9rem;
            letter-spacing: 0.1em;
        }

        .image-upload-area .upload-placeholder span {
            display: block;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .image-upload-area img {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
        }

        .image-upload-area .remove-image {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: var(--ink);
            color: var(--paper);
            border: none;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-upload-wrapper {
            position: relative;
        }

        .form-row {
            display: flex;
            gap: 1rem;
        }

        .form-row .form-group {
            flex: 1;
        }

        /* Product List */
        .product-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .product-item {
            display: flex;
            align-items: center;
            padding: 1rem 1.5rem;
            background-color: var(--white);
            border: 1px solid var(--slate);
            transition: all var(--transition-medium);
        }

        .product-item:hover {
            border-color: var(--ink);
        }

        .product-item-image {
            width: 60px;
            height: 60px;
            object-fit: cover;
            background-color: var(--mist);
            margin-right: 1rem;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--ink-light);
            font-size: 0.75rem;
        }

        .product-item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-item-info {
            flex-grow: 1;
            min-width: 0;
        }

        .product-item-title {
            font-size: 1rem;
            letter-spacing: 0.1em;
            color: var(--ink);
            margin-bottom: 0.25rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .product-item-description {
            font-size: 0.8rem;
            color: var(--ink-light);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .product-item-actions {
            flex-shrink: 0;
            margin-left: 1rem;
        }

        .btn-delete {
            padding: 0.5em 1em;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            border: 1px solid var(--umber);
            background-color: transparent;
            color: var(--umber);
            cursor: pointer;
            transition: all var(--transition-medium);
        }

        .btn-delete:hover {
            background-color: var(--umber);
            color: var(--paper);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--ink-light);
        }

        .empty-state p {
            font-size: 1rem;
            letter-spacing: 0.2em;
            margin-bottom: 1rem;
        }

        .logout-btn {
            position: absolute;
            top: calc(var(--margin-height) - 2vh);
            left: 8vw;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            color: var(--ink-light);
            cursor: pointer;
            transition: color var(--transition-medium);
        }

        .logout-btn:hover {
            color: var(--ink);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .page-title {
                right: 8vw;
                font-size: 2.2rem;
            }

            .admin-container {
                left: 20vw;
                right: 5vw;
            }
        }

        @media (max-width: 768px) {
            .page-title {
                right: 5vw;
                font-size: 1.8rem;
            }

            .admin-container {
                left: 5vw;
                right: 5vw;
                top: calc(var(--margin-height) + 12vh);
            }

            .admin-tabs {
                gap: 1rem;
            }

            .form-row {
                flex-direction: column;
            }

            .product-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .product-item-image {
                width: 100%;
                height: 120px;
                margin-right: 0;
                margin-bottom: 0.5rem;
            }

            .product-item-actions {
                margin-left: 0;
                margin-top: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="viewport">
        <!-- Upper margin band -->
        <div class="margin-band"></div>

        <!-- WebGL background -->
        <div class="canvas-area">
            <div id="webgl-container"></div>
        </div>

        <!-- Lower margin band -->
        <div class="margin-band"></div>

        <!-- Content layer -->
        <div class="content-layer">
            <!-- Page title -->
            <h1 class="page-title">洞府</h1>

            <!-- Navigation -->
            <nav class="nav-links interactive">
                <a href="index.html" class="nav-item">
                    <span class="nav-cn">首页</span>
                    <span class="nav-en">Home</span>
                </a>
                <a href="products.html" class="nav-item">
                    <span class="nav-cn">炼器坊</span>
                    <span class="nav-en">Artifacts</span>
                </a>
                <a href="admin.html" class="nav-item">
                    <span class="nav-cn">洞府</span>
                    <span class="nav-en">Dwelling</span>
                </a>
            </nav>

            <!-- Logout button (visible after login) -->
            <div class="logout-btn interactive" id="logoutBtn" style="display: none;">
                离去
            </div>

            <!-- Admin container -->
            <div class="admin-container">
                <!-- Login Section -->
                <section class="login-section" id="loginSection">
                    <form class="login-form" id="loginForm">
                        <div class="form-group">
                            <input type="password"
                                   class="form-input"
                                   id="passwordInput"
                                   placeholder="密钥"
                                   autocomplete="off">
                        </div>
                        <button type="submit" class="btn btn-outline" style="width: 100%;">
                            进入
                        </button>
                        <div class="login-error" id="loginError">
                            密钥错误，请重试
                        </div>
                    </form>
                </section>

                <!-- Admin Panel Section -->
                <section class="admin-section" id="adminSection">
                    <!-- Tabs -->
                    <div class="admin-tabs">
                        <div class="admin-tab active" data-tab="create">铸器</div>
                        <div class="admin-tab" data-tab="list">名录</div>
                    </div>

                    <!-- Create Product Panel -->
                    <div class="admin-panel active" id="createPanel">
                        <form class="product-form" id="productForm">
                            <div class="form-group">
                                <label class="form-label">名称</label>
                                <input type="text"
                                       class="form-input"
                                       id="productTitle"
                                       placeholder="请输入器物名称"
                                       required>
                            </div>

                            <div class="form-group">
                                <label class="form-label">描述</label>
                                <textarea class="form-textarea"
                                          id="productDescription"
                                          placeholder="请输入器物描述"></textarea>
                            </div>

                            <div class="form-group">
                                <label class="form-label">图片</label>
                                <div class="image-upload-wrapper">
                                    <div class="image-upload-area" id="imageUploadArea">
                                        <div class="upload-placeholder">
                                            <span>鼎</span>
                                            点击上传图片
                                        </div>
                                    </div>
                                    <input type="file"
                                           id="imageInput"
                                           accept="image/*"
                                           style="display: none;">
                                </div>
                            </div>

                            <div class="form-group">
                                <label class="form-label">链接</label>
                                <input type="url"
                                       class="form-input"
                                       id="productLink"
                                       placeholder="https://">
                            </div>

                            <button type="submit" class="btn btn-solid">
                                发布
                            </button>
                        </form>
                    </div>

                    <!-- Product List Panel -->
                    <div class="admin-panel" id="listPanel">
                        <div class="product-list" id="productList">
                            <!-- Products will be loaded dynamically -->
                        </div>
                    </div>
                </section>
            </div>

            <!-- Footer mark -->
            <div class="footer-mark interactive">
                甲辰年 · 个人独立站
            </div>
        </div>
    </div>

    <!-- Three.js for WebGL -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- App JavaScript -->
    <script src="js/app.js"></script>

    <script>
        // ==================== WebGL Ink Wash Background ====================
        (function() {
            const container = document.getElementById('webgl-container');
            const scene = new THREE.Scene();

            const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: false });

            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            const vertexShader = `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `;

            const fragmentShader = `
                uniform float u_time;
                uniform vec2 u_resolution;
                varying vec2 vUv;

                // Simplex 2D noise
                vec3 permute(vec3 x) { return mod(((x*34.0)+1.0)*x, 289.0); }
                float snoise(vec2 v){
                    const vec4 C = vec4(0.211324865405187, 0.366025403784439,
                            -0.577350269189626, 0.024390243902439);
                    vec2 i  = floor(v + dot(v, C.yy) );
                    vec2 x0 = v -   i + dot(i, C.xx);
                    vec2 i1;
                    i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
                    vec4 x12 = x0.xyxy + C.xxzz;
                    x12.xy -= i1;
                    i = mod(i, 289.0);
                    vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0 ))
                    + i.x + vec3(0.0, i1.x, 1.0 ));
                    vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
                    m = m*m ;
                    m = m*m ;
                    vec3 x = 2.0 * fract(p * C.www) - 1.0;
                    vec3 h = abs(x) - 0.5;
                    vec3 ox = floor(x + 0.5);
                    vec3 a0 = x - ox;
                    m *= 1.79284291400159 - 0.85373472095314 * ( a0*a0 + h*h );
                    vec3 g;
                    g.x  = a0.x  * x0.x  + h.x  * x0.y;
                    g.yz = a0.yz * x12.xz + h.yz * x12.yw;
                    return 130.0 * dot(m, g);
                }

                // Fractional Brownian Motion for layered organic texture
                float fbm(vec2 st) {
                    float value = 0.0;
                    float amplitude = 0.5;
                    float frequency = 0.0;
                    for (int i = 0; i < 5; i++) {
                        value += amplitude * snoise(st);
                        st *= 2.0;
                        amplitude *= 0.5;
                    }
                    return value;
                }

                void main() {
                    vec2 st = gl_FragCoord.xy / u_resolution.xy;
                    st.x *= u_resolution.x / u_resolution.y;

                    float time = u_time * 0.05;

                    vec2 q = vec2(0.);
                    q.x = fbm(st + vec2(time));
                    q.y = fbm(st + vec2(1.0));

                    vec2 r = vec2(0.);
                    r.x = fbm(st + 1.0*q + vec2(1.7,9.2)+ 0.15*time);
                    r.y = fbm(st + 1.0*q + vec2(8.3,2.8)+ 0.126*time);

                    float f = fbm(st + r);

                    vec3 colorPaper = vec3(0.82, 0.80, 0.77);
                    vec3 colorSlate = vec3(0.54, 0.55, 0.53);
                    vec3 colorUmber = vec3(0.42, 0.36, 0.32);
                    vec3 colorMist  = vec3(0.64, 0.68, 0.67);
                    vec3 colorWhite = vec3(0.92, 0.92, 0.90);

                    vec3 color = mix(colorPaper, colorMist, clamp((f*f)*4.0, 0.0, 1.0));
                    color = mix(color, colorSlate, clamp(length(q), 0.0, 1.0));
                    color = mix(color, colorUmber, clamp(length(r.x), 0.0, 1.0) * 0.5);

                    float highlight = smoothstep(0.6, 1.0, f);
                    color = mix(color, colorWhite, highlight * 0.8);

                    float banding = sin(st.y * 100.0) * 0.02;
                    color += banding;

                    gl_FragColor = vec4(color, 1.0);
                }
            `;

            const uniforms = {
                u_time: { value: 0.0 },
                u_resolution: { value: new THREE.Vector2(container.clientWidth, container.clientHeight) }
            };

            const material = new THREE.ShaderMaterial({
                vertexShader,
                fragmentShader,
                uniforms
            });

            const geometry = new THREE.PlaneGeometry(2, 2);
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            const clock = new THREE.Clock();

            function animate() {
                requestAnimationFrame(animate);
                uniforms.u_time.value = clock.getElapsedTime();
                renderer.render(scene, camera);
            }

            animate();

            window.addEventListener('resize', () => {
                const width = container.clientWidth;
                const height = container.clientHeight;

                renderer.setSize(width, height);
                uniforms.u_resolution.value.set(width, height);
            });
        })();

        // ==================== Admin Logic ====================
        (function() {
            // DOM Elements
            const loginSection = document.getElementById('loginSection');
            const adminSection = document.getElementById('adminSection');
            const loginForm = document.getElementById('loginForm');
            const passwordInput = document.getElementById('passwordInput');
            const loginError = document.getElementById('loginError');
            const logoutBtn = document.getElementById('logoutBtn');
            const adminTabs = document.querySelectorAll('.admin-tab');
            const adminPanels = document.querySelectorAll('.admin-panel');
            const productForm = document.getElementById('productForm');
            const productList = document.getElementById('productList');
            const imageUploadArea = document.getElementById('imageUploadArea');
            const imageInput = document.getElementById('imageInput');

            let currentImage = null;

            // Check if already logged in
            function checkLoginStatus() {
                if (XUNDAO.admin.isAdminLoggedIn()) {
                    showAdminPanel();
                }
            }

            // Show admin panel
            function showAdminPanel() {
                loginSection.style.display = 'none';
                adminSection.style.display = 'block';
                logoutBtn.style.display = 'block';
                renderProductList();
            }

            // Show login section
            function showLoginSection() {
                loginSection.style.display = 'flex';
                adminSection.style.display = 'none';
                logoutBtn.style.display = 'none';
                passwordInput.value = '';
                loginError.classList.remove('visible');
            }

            // Handle login
            function handleLogin(e) {
                e.preventDefault();
                const password = passwordInput.value;

                // Check if password is set
                if (!XUNDAO.admin.hasPassword()) {
                    // First time: set password
                    XUNDAO.admin.setPassword(password);
                    XUNDAO.admin.adminLogin(password);
                    showAdminPanel();
                    return;
                }

                // Verify password
                const result = XUNDAO.admin.verifyPassword(password);
                if (result) {
                    XUNDAO.admin.adminLogin(password);
                    showAdminPanel();
                } else {
                    loginError.classList.add('visible');
                }
            }

            // Handle logout
            function handleLogout() {
                XUNDAO.admin.adminLogout();
                showLoginSection();
            }

            // Tab switching
            function switchTab(tabName) {
                adminTabs.forEach(tab => {
                    tab.classList.toggle('active', tab.dataset.tab === tabName);
                });
                adminPanels.forEach(panel => {
                    panel.classList.toggle('active', panel.id === tabName + 'Panel');
                });
            }

            // Image upload handling
            function handleImageUpload() {
                imageInput.addEventListener('change', async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;

                    try {
                        currentImage = await XUNDAO.imageUtils.imageToBase64(file);
                        imageUploadArea.innerHTML = `<img src="${currentImage}" alt="Preview">`;
                        imageUploadArea.classList.add('has-image');

                        // Add remove button
                        const removeBtn = document.createElement('button');
                        removeBtn.type = 'button';
                        removeBtn.className = 'remove-image';
                        removeBtn.innerHTML = '×';
                        removeBtn.addEventListener('click', (ev) => {
                            ev.stopPropagation();
                            removeImage();
                        });
                        imageUploadArea.appendChild(removeBtn);
                    } catch (error) {
                        alert('图片上传失败: ' + error.message);
                    }
                });
            }

            function removeImage() {
                currentImage = null;
                imageInput.value = '';
                imageUploadArea.innerHTML = `
                    <div class="upload-placeholder">
                        <span>鼎</span>
                        点击上传图片
                    </div>
                `;
                imageUploadArea.classList.remove('has-image');
            }

            // Handle image upload area click
            imageUploadArea.addEventListener('click', () => {
                imageInput.click();
            });

            // Handle product form submission
            function handleProductSubmit(e) {
                e.preventDefault();

                const title = document.getElementById('productTitle').value.trim();
                const description = document.getElementById('productDescription').value.trim();
                const link = document.getElementById('productLink').value.trim();

                if (!title) {
                    alert('请输入器物名称');
                    return;
                }

                // Add product
                XUNDAO.products.addProduct({
                    title: title,
                    description: description,
                    image: currentImage || '',
                    link: link
                });

                // Reset form
                productForm.reset();
                removeImage();

                // Switch to list tab
                switchTab('list');

                // Refresh product list
                renderProductList();
            }

            // Render product list
            function renderProductList() {
                const products = XUNDAO.products.getProducts();

                if (products.length === 0) {
                    productList.innerHTML = `
                        <div class="empty-state">
                            <p>暂未收录任何藏品</p>
                            <p style="font-size: 0.8rem; color: var(--mist);">可在"铸器"中添加新的器物</p>
                        </div>
                    `;
                    return;
                }

                productList.innerHTML = products.map(product => `
                    <div class="product-item" data-id="${product.id}">
                        <div class="product-item-image">
                            ${product.image
                                ? `<img src="${product.image}" alt="${escapeHtml(product.title)}">`
                                : '无相'
                            }
                        </div>
                        <div class="product-item-info">
                            <div class="product-item-title">${escapeHtml(product.title)}</div>
                            <div class="product-item-description">${escapeHtml(product.description || '暂无描述')}</div>
                        </div>
                        <div class="product-item-actions">
                            <button class="btn-delete" data-id="${product.id}">除名</button>
                        </div>
                    </div>
                `).join('');

                // Add delete event listeners
                document.querySelectorAll('.btn-delete').forEach(btn => {
                    btn.addEventListener('click', handleDeleteProduct);
                });
            }

            // Handle product deletion
            function handleDeleteProduct(e) {
                const productId = e.target.dataset.id;
                if (confirm('确定要删除此器物吗？')) {
                    XUNDAO.products.deleteProduct(productId);
                    renderProductList();
                }
            }

            // HTML escape function
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // Event listeners
            loginForm.addEventListener('submit', handleLogin);
            logoutBtn.addEventListener('click', handleLogout);
            productForm.addEventListener('submit', handleProductSubmit);
            handleImageUpload();

            adminTabs.forEach(tab => {
                tab.addEventListener('click', () => switchTab(tab.dataset.tab));
            });

            // Initialize
            checkLoginStatus();
        })();
    </script>
</body>
</html>
