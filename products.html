<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>炼器坊 - 寻道</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Noto+Serif+SC:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <style>
        /* Page-specific styles for products page */
        .page-title {
            position: absolute;
            top: calc(var(--margin-height) - 2vh);
            right: 12vw;
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-size: 2.8rem;
            font-weight: 300;
            letter-spacing: 0.8em;
            line-height: 2;
            color: var(--ink);
            text-shadow: 0 0 20px rgba(244, 242, 236, 0.5);
        }

        .products-section {
            position: absolute;
            top: calc(var(--margin-height) + 8vh);
            left: 25vw;
            right: 8vw;
            bottom: calc(var(--margin-height) / 2);
            overflow-y: auto;
            pointer-events: auto;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            padding: 1rem;
        }

        .product-card {
            background-color: var(--white);
            border: 1px solid var(--slate);
            padding: 1.5rem;
            transition: transform 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(42, 41, 39, 0.1);
            border-color: var(--ink);
        }

        .product-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            margin-bottom: 1rem;
            background-color: var(--mist);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--ink-light);
            font-size: 0.9rem;
            letter-spacing: 0.2em;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-title {
            font-size: 1.25rem;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
            color: var(--ink);
        }

        .product-description {
            font-size: 0.9rem;
            color: var(--ink-light);
            line-height: 1.6;
            margin-bottom: 1rem;
            flex-grow: 1;
        }

        .product-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 1rem;
            border-top: 1px solid var(--slate);
        }

        .like-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--ink-light);
            font-family: var(--font-en);
            font-size: 0.9rem;
            font-style: italic;
            transition: color 0.3s ease;
        }

        .like-btn:hover {
            color: var(--ink);
        }

        .like-btn.liked {
            color: var(--ink);
        }

        .like-icon {
            font-style: normal;
            transition: transform 0.3s ease;
        }

        .like-btn:hover .like-icon {
            transform: scale(1.2);
        }

        .product-link-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.5em 1.2em;
            font-family: var(--font-cn);
            font-size: 0.85rem;
            letter-spacing: 0.15em;
            border: 1px solid var(--ink);
            background-color: transparent;
            color: var(--ink);
            cursor: pointer;
            transition: all 0.4s ease;
            text-decoration: none;
        }

        .product-link-btn:hover {
            background-color: var(--ink);
            color: var(--paper);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--ink-light);
        }

        .empty-state p {
            font-size: 1rem;
            letter-spacing: 0.2em;
            margin-bottom: 1rem;
        }

        .empty-state .empty-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .page-title {
                right: 8vw;
                font-size: 2.2rem;
            }

            .products-section {
                left: 20vw;
                right: 5vw;
            }

            .product-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            }
        }

        @media (max-width: 768px) {
            .page-title {
                right: 5vw;
                font-size: 1.8rem;
            }

            .products-section {
                left: 5vw;
                right: 5vw;
                top: calc(var(--margin-height) + 12vh);
            }

            .product-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="viewport">
        <!-- Upper margin band -->
        <div class="margin-band"></div>

        <!-- WebGL background -->
        <div class="canvas-area">
            <div id="webgl-container"></div>
        </div>

        <!-- Lower margin band -->
        <div class="margin-band"></div>

        <!-- Content layer -->
        <div class="content-layer">
            <!-- Page title -->
            <h1 class="page-title">炼器坊</h1>

            <!-- Navigation -->
            <nav class="nav-links interactive">
                <a href="index.html" class="nav-item">
                    <span class="nav-cn">首页</span>
                    <span class="nav-en">Home</span>
                </a>
                <a href="products.html" class="nav-item">
                    <span class="nav-cn">炼器坊</span>
                    <span class="nav-en">Artifacts</span>
                </a>
                <a href="admin.html" class="nav-item">
                    <span class="nav-cn">管理</span>
                    <span class="nav-en">Admin</span>
                </a>
            </nav>

            <!-- Products section -->
            <section class="products-section">
                <div class="product-grid" id="product-grid">
                    <!-- Products will be loaded dynamically -->
                </div>
            </section>

            <!-- Footer mark -->
            <div class="footer-mark interactive">
                甲辰年 · 个人独立站
            </div>
        </div>
    </div>

    <!-- Three.js for WebGL -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- App JavaScript -->
    <script src="js/app.js"></script>

    <script>
        // ==================== WebGL Ink Wash Background ====================
        (function() {
            const container = document.getElementById('webgl-container');
            const scene = new THREE.Scene();

            const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: false });

            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            const vertexShader = `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = vec4(position, 1.0);
                }
            `;

            const fragmentShader = `
                uniform float u_time;
                uniform vec2 u_resolution;
                varying vec2 vUv;

                // Simplex 2D noise
                vec3 permute(vec3 x) { return mod(((x*34.0)+1.0)*x, 289.0); }
                float snoise(vec2 v){
                    const vec4 C = vec4(0.211324865405187, 0.366025403784439,
                            -0.577350269189626, 0.024390243902439);
                    vec2 i  = floor(v + dot(v, C.yy) );
                    vec2 x0 = v -   i + dot(i, C.xx);
                    vec2 i1;
                    i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
                    vec4 x12 = x0.xyxy + C.xxzz;
                    x12.xy -= i1;
                    i = mod(i, 289.0);
                    vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0 ))
                    + i.x + vec3(0.0, i1.x, 1.0 ));
                    vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
                    m = m*m ;
                    m = m*m ;
                    vec3 x = 2.0 * fract(p * C.www) - 1.0;
                    vec3 h = abs(x) - 0.5;
                    vec3 ox = floor(x + 0.5);
                    vec3 a0 = x - ox;
                    m *= 1.79284291400159 - 0.85373472095314 * ( a0*a0 + h*h );
                    vec3 g;
                    g.x  = a0.x  * x0.x  + h.x  * x0.y;
                    g.yz = a0.yz * x12.xz + h.yz * x12.yw;
                    return 130.0 * dot(m, g);
                }

                // Fractional Brownian Motion for layered organic texture
                float fbm(vec2 st) {
                    float value = 0.0;
                    float amplitude = 0.5;
                    float frequency = 0.0;
                    for (int i = 0; i < 5; i++) {
                        value += amplitude * snoise(st);
                        st *= 2.0;
                        amplitude *= 0.5;
                    }
                    return value;
                }

                void main() {
                    vec2 st = gl_FragCoord.xy / u_resolution.xy;
                    st.x *= u_resolution.x / u_resolution.y;

                    float time = u_time * 0.05;

                    vec2 q = vec2(0.);
                    q.x = fbm(st + vec2(time));
                    q.y = fbm(st + vec2(1.0));

                    vec2 r = vec2(0.);
                    r.x = fbm(st + 1.0*q + vec2(1.7,9.2)+ 0.15*time);
                    r.y = fbm(st + 1.0*q + vec2(8.3,2.8)+ 0.126*time);

                    float f = fbm(st + r);

                    vec3 colorPaper = vec3(0.82, 0.80, 0.77);
                    vec3 colorSlate = vec3(0.54, 0.55, 0.53);
                    vec3 colorUmber = vec3(0.42, 0.36, 0.32);
                    vec3 colorMist  = vec3(0.64, 0.68, 0.67);
                    vec3 colorWhite = vec3(0.92, 0.92, 0.90);

                    vec3 color = mix(colorPaper, colorMist, clamp((f*f)*4.0, 0.0, 1.0));
                    color = mix(color, colorSlate, clamp(length(q), 0.0, 1.0));
                    color = mix(color, colorUmber, clamp(length(r.x), 0.0, 1.0) * 0.5);

                    float highlight = smoothstep(0.6, 1.0, f);
                    color = mix(color, colorWhite, highlight * 0.8);

                    float banding = sin(st.y * 100.0) * 0.02;
                    color += banding;

                    gl_FragColor = vec4(color, 1.0);
                }
            `;

            const uniforms = {
                u_time: { value: 0.0 },
                u_resolution: { value: new THREE.Vector2(container.clientWidth, container.clientHeight) }
            };

            const material = new THREE.ShaderMaterial({
                vertexShader,
                fragmentShader,
                uniforms
            });

            const geometry = new THREE.PlaneGeometry(2, 2);
            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            const clock = new THREE.Clock();

            function animate() {
                requestAnimationFrame(animate);
                uniforms.u_time.value = clock.getElapsedTime();
                renderer.render(scene, camera);
            }

            animate();

            window.addEventListener('resize', () => {
                const width = container.clientWidth;
                const height = container.clientHeight;

                renderer.setSize(width, height);
                uniforms.u_resolution.value.set(width, height);
            });
        })();

        // ==================== Product Display Logic ====================
        (function() {
            const productGrid = document.getElementById('product-grid');

            // HTML 转义函数，防止 XSS
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // Render products
            function renderProducts() {
                const products = XUNDAO.products.getProducts();

                if (products.length === 0) {
                    productGrid.innerHTML = `
                        <div class="empty-state" style="grid-column: 1 / -1;">
                            <div class="empty-icon">鼎</div>
                            <p>暂无器物</p>
                            <p style="font-size: 0.8rem; color: var(--mist);">炼器坊正在搜集天地灵宝</p>
                        </div>
                    `;
                    return;
                }

                productGrid.innerHTML = products.map(product => {
                    const likes = XUNDAO.likes.getProductLikes(product.id);
                    const hasLiked = XUNDAO.likes.hasLiked(product.id);
                    const safeTitle = escapeHtml(product.title);
                    const safeDesc = escapeHtml(product.description);
                    const safeLink = escapeHtml(product.link || '');

                    return `
                        <article class="product-card">
                            <div class="product-image">
                                ${product.image
                                    ? `<img src="${product.image}" alt="${safeTitle}">`
                                    : '<span>无相</span>'
                                }
                            </div>
                            <h3 class="product-title">${safeTitle}</h3>
                            <p class="product-description">${safeDesc}</p>
                            <div class="product-actions">
                                <button class="like-btn ${hasLiked ? 'liked' : ''}"
                                        data-id="${product.id}"
                                        ${hasLiked ? 'disabled' : ''}>
                                    <span class="like-icon">♥</span>
                                    <span class="like-count">${likes}</span>
                                </button>
                                ${product.link
                                    ? `<a href="${safeLink}" target="_blank" rel="noopener" class="product-link-btn">
                                        前往
                                       </a>`
                                    : ''
                                }
                            </div>
                        </article>
                    `;
                }).join('');

                // Add event listeners to like buttons
                document.querySelectorAll('.like-btn').forEach(btn => {
                    btn.addEventListener('click', handleLike);
                });
            }

            // Handle like button click
            function handleLike(e) {
                const btn = e.currentTarget;
                const productId = btn.dataset.id;

                if (XUNDAO.likes.hasLiked(productId)) {
                    return;
                }

                const result = XUNDAO.likes.likeProduct(productId);

                if (result.success) {
                    btn.classList.add('liked');
                    btn.disabled = true;
                    btn.querySelector('.like-count').textContent = result.likes;
                }
            }

            // Initialize
            renderProducts();
        })();
    </script>
</body>
</html>
